theme = "gruvbox_dark_hard"

[editor]
line-number = "relative"
true-color = true
rulers = [120]
auto-save = true
text-width = 120
bufferline = "always"
shell = ["zsh", "-c"]
terminal.command = "zsh"
terminal.args = ["-c"]
end-of-line-diagnostics = "hint"

[editor.inline-diagnostics]
cursor-line = "hint"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[keys.normal]
C-t = [":write-all", ":insert-output serpl >/dev/tty", ":redraw", ":reload-all"]
"H" = ":buffer-previous"
"L" = ":buffer-next"
C-j = "jump_view_down"
C-k = "jump_view_up"
C-h = "jump_view_left"
C-l = "jump_view_right"
S-j = ["extend_to_line_bounds", "delete_selection", "paste_after"]
S-k = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
# C-g = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
# C-d = [":new", ":insert-output lazydocker", ":buffer-close!", ":redraw"]
# C-q = [":new", ":insert-output lazysql", ":buffer-close!", ":redraw"]
esc = ["collapse_selection", "keep_primary_selection"]

[editor.statusline]
left = ["mode", "spinner", "file-name", "version-control"]
center = []
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
right = ["diagnostics", "selections", "position", "total-line-numbers", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
